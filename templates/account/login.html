{% extends "base.html" %}
{% load i18n %}
{% load socialaccount %}

{% block content %}
<section class="relative min-h-screen flex items-center justify-center py-20">
    <!-- Animated blobs -->
    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob [animation-delay:2s]"></div>

    <div class="container mx-auto px-4 relative z-10 flex justify-center">
        <div class="glass w-full max-w-md p-6 md:p-8 rounded-2xl shadow-2xl relative overflow-hidden">
            <!-- Decorative border gradient at bottom -->
            <div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-400 to-purple-500"></div>

            <h1 class="text-3xl font-bold mb-2 text-center text-[var(--text)]">Bienvenue</h1>
            <p class="text-[var(--text-muted)] text-center mb-8">Connectez-vous pour continuer</p>

            <style>
                .django-form p { margin-bottom: 1.25rem; }
                .django-form label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem; }
                .django-form input:not([type="checkbox"]) { width: 100%; background: var(--glass-hover); border: 1px solid var(--glass-border); border-radius: 0.75rem; padding: 0.875rem 1rem; color: var(--text); transition: all 0.3s ease; backdrop-filter: blur(5px); }
                .django-form input:not([type="checkbox"]):focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); background: var(--bg); }
                .django-form input:not([type="checkbox"]):hover { border-color: var(--primary); }
                .django-form input[type="checkbox"] { border-radius: 0.25rem; background: var(--glass-border); border-color: var(--glass-border); width: 1rem; height: 1rem; margin-right: 0.5rem; cursor: pointer; accent-color: #3b82f6; }
                .django-form .helptext { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.375rem; display: block; }
                .django-form ul.errorlist { color: #f87171; font-size: 0.875rem; margin-top: 0.375rem; list-style-type: none; padding: 0; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); padding: 0.5rem; border-radius: 0.5rem; }
            </style>

            <form class="django-form w-full" method="POST" action="{% url 'account_login' %}">
                {% csrf_token %}
                {{ form.as_p }}
                
                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                {% endif %}

                <button class="w-full mt-2 px-8 py-3.5 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(37,99,235,0.4)] hover:shadow-[0_0_25px_rgba(37,99,235,0.6)] transform hover:-translate-y-0.5 text-white flex items-center justify-center gap-2" type="submit">
                    Vérifier l'accès
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </form>

            <div class="relative flex items-center my-8">
                <div class="flex-grow border-t border-[var(--glass-border)]"></div>
                <span class="flex-shrink mx-4 text-[var(--text-muted)] text-[10px] uppercase tracking-[0.2em]">ou avec</span>
                <div class="flex-grow border-t border-[var(--glass-border)]"></div>
            </div>

            <form method="POST" action="{% provider_login_url 'google' %}">
                {% csrf_token %}
                <button type="submit" class="w-full py-3 px-4 glass border border-[var(--glass-border)] rounded-xl flex items-center justify-center gap-3 hover:bg-[var(--glass-hover)] transition-all group cursor-pointer">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span class="text-[var(--text)] text-sm font-medium">Continuer avec Google</span>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-[var(--text-muted)] group">
                Nouveau membre ? 
                <a href="{% url 'account_signup' %}" class="text-blue-400 hover:text-blue-500 font-semibold transition-all relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-blue-400 after:transition-all hover:after:w-full">
                    S'inscrire
                </a>
            </div>
            
            <div class="mt-4 text-center text-sm">
                <a class="text-[var(--text-muted)] hover:text-[var(--text)] transition-colors" href="{% url 'account_reset_password' %}">Mot de passe oublié ?</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
