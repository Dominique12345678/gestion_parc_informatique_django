<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Parc | Gestion Intelligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }
    </style>
</head>

<body class="bg-slate-900 text-white overflow-x-hidden">
    {% block navbar %}
    {% include 'layouts/_navbar.html' %}
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}
    {% include 'layouts/_footer.html' %}
    {% endblock %}


    {% if messages %}
    <div class="fixed top-24 right-6 z-[60] space-y-4">
        {% for message in messages %}
        <div
            class="glass px-6 py-4 rounded-2xl border border-white/10 shadow-2xl {% if message.tags == 'error' %}text-red-400{% else %}text-emerald-400{% endif %} animate-bounce">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
</body>

</html>
