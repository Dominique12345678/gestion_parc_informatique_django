<!DOCTYPE html>
<html lang="fr" class="scroll-smooth" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Parc | Gestion Intelligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/modern.css' %}">
    
    <script>
        // Gestion du Thème
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            if (target === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
    </script>
</head>

<body class="bg-[var(--bg)] text-[var(--text)] transition-colors duration-500 font-sans">
    {% block navbar %}
    {% include 'layouts/_navbar.html' %}
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}
    {% include 'layouts/_footer.html' %}
    {% endblock %}


    {% if messages %}
    <div id="messages-container" class="fixed top-6 md:top-24 right-4 md:right-6 left-4 md:left-auto z-[60] space-y-4">
        {% for message in messages %}
        <div class="message-item glass px-6 py-4 rounded-2xl border border-[var(--glass-border)] shadow-2xl {% if message.tags == 'error' %}text-red-500 border-red-500/20{% else %}text-emerald-500 border-emerald-500/20{% endif %} text-sm md:text-base text-center md:text-left transition-all duration-500">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    <script>
        setTimeout(() => {
            const container = document.getElementById('messages-container');
            if (container) {
                container.style.opacity = '0';
                setTimeout(() => container.remove(), 500);
            }
        }, 5000);
    </script>
    {% endif %}
</body>

</html>
