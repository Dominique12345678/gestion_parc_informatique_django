{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 pt-20">
    <div class="glass w-full max-w-md p-10 rounded-3xl border border-white/10 shadow-2xl text-center">
        <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-white mb-2">Code de vérification</h2>
        <p class="text-gray-400 mb-8 text-sm">Entrez le code à 6 chiffres envoyé à votre adresse mail.</p>

        <form method="POST" action="{% url 'verify_otp' %}" class="space-y-6">
            {% csrf_token %}
            <div class="flex justify-center gap-2">
                <input type="text" name="otp_code" id="otp_input" maxlength="6" placeholder="000000" required autofocus
                    class="w-48 text-center text-2xl tracking-[0.5em] font-bold bg-slate-800/50 border border-white/10 rounded-xl py-3 text-white focus:ring-2 focus:ring-blue-500/50 outline-none">
            </div>

            <button type="submit"
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-500/20">
                Vérifier le compte
            </button>
        </form>

        <div class="mt-8">
            <p id="resend-timer" class="text-xs text-gray-500">
                Vous pourrez renvoyer un code dans <span id="timer" class="text-blue-400 font-bold">60</span> secondes.
            </p>
            <p id="resend-link" class="hidden text-xs text-gray-500">
                Vous n'avez rien reçu ? <a href="{% url 'resend_otp' %}" class="text-blue-400 hover:underline">Renvoyer le code</a>
            </p>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                let timeLeft = 60;
                const timerElement = document.getElementById('timer');
                const timerText = document.getElementById('resend-timer');
                const resendLink = document.getElementById('resend-link');

                const countdown = setInterval(() => {
                    timeLeft--;
                    timerElement.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        timerText.classList.add('hidden');
                        resendLink.classList.remove('hidden');
                    }
                }, 1000);
            });
        </script>
    </div>
</div>
{% endblock %}
