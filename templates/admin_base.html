{% extends "base.html" %}

{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="flex h-screen bg-slate-900 overflow-hidden text-white font-sans">
    <!-- Sidebar Globale Admin -->
    {% include "layouts/_admin_sidebar.html" %}
    
    <!-- Contenu Principal Déroulant -->
    <div class="flex-1 overflow-y-auto w-full relative">
        <!-- Effets lumineux background -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl mix-blend-screen pointer-events-none animate-blob"></div>
        <div class="absolute bottom-1/4 left-1/4 w-96 h-96 bg-emerald-600/10 rounded-full blur-3xl mix-blend-screen pointer-events-none animate-blob" style="animation-delay: 2s;"></div>
        
        <div class="relative z-10 w-full max-w-screen-xl mx-auto px-8 py-10">
            {% block admin_content %}{% endblock %}
        </div>
    </div>
</div>

<!-- Chart.js Injection (pour le dashboard) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}
