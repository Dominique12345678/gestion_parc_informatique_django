<aside class="w-20 lg:w-64 glass border-r border-white/10 flex flex-col justify-between transition-all duration-300">
    <div>
        <!-- Logo -->
        <div class="flex items-center justify-center lg:justify-start gap-4 p-6 border-b border-white/10 mb-6">
            <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                <span class="font-black text-xl text-white">G</span>
            </div>
            <span class="font-bold text-xl tracking-wider text-white hidden lg:block">Admin<span class="text-blue-400">.</span></span>
        </div>

        <!-- Navigation Links -->
        <nav class="flex flex-col gap-2 px-3">
            <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-blue-600/20 text-blue-400 border border-blue-500/20 shadow-lg{% else %}text-gray-400 hover:text-white hover:bg-white/5{% endif %} group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="font-medium hidden lg:block text-sm">Dashboard</span>
            </a>

            <a href="{% url 'admin_manage_users' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 {% if 'user' in request.resolver_match.url_name %}bg-blue-600/20 text-blue-400 border border-blue-500/20 shadow-lg{% else %}text-gray-400 hover:text-white hover:bg-white/5{% endif %} group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="font-medium hidden lg:block text-sm">Comptes Rôles</span>
            </a>

            <div class="h-px bg-white/10 my-2 mx-4"></div>
            <p class="text-[10px] uppercase font-bold text-gray-500 tracking-widest px-4 hidden lg:block mb-2 mt-2">Gestion</p>

            <a href="{% url 'admin_manage_devices' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 {% if 'device' in request.resolver_match.url_name %}bg-orange-600/20 text-orange-400 border border-orange-500/20 shadow-lg{% else %}text-gray-400 hover:text-white hover:bg-white/5{% endif %} group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="font-medium hidden lg:block text-sm">Équipements</span>
            </a>

            <a href="{% url 'admin_categories' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 {% if 'categories' in request.resolver_match.url_name %}bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 shadow-lg{% else %}text-gray-400 hover:text-white hover:bg-white/5{% endif %} group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="font-medium hidden lg:block text-sm">Catégories</span>
            </a>

            <a href="{% url 'admin_assign_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 {% if 'assign_list' in request.resolver_match.url_name %}bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 shadow-lg{% else %}text-gray-400 hover:text-white hover:bg-white/5{% endif %} group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                <span class="font-medium hidden lg:block text-sm">Assignations</span>
            </a>

            <a href="{% url 'user_dashboard' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 {% if request.resolver_match.url_name == 'user_dashboard' %}bg-purple-600/20 text-purple-400 border border-purple-500/20 shadow-lg{% else %}text-gray-400 hover:text-white hover:bg-white/5{% endif %} group">
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <span class="font-medium hidden lg:block text-sm">Mon Matériel</span>
            </a>
        </nav>
    </div>

    <!-- Bottom Actions -->
    <div class="px-3 pb-6 space-y-2">
        <a href="{% url 'home' %}" class="flex items-center justify-center lg:justify-start gap-4 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="hidden lg:block text-sm font-medium">Portail Public</span>
        </a>
        <a href="{% url 'profile' %}" class="flex items-center justify-center lg:justify-start gap-4 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all group {% if request.resolver_match.url_name == 'profile' %}bg-white/10 text-white{% endif %}">
            <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="hidden lg:block text-sm font-medium">Mon Compte</span>
        </a>
        <form action="{% url 'account_logout' %}" method="post" class="w-full">
            {% csrf_token %}
            <button class="w-full flex items-center justify-center lg:justify-start gap-4 px-4 py-3 rounded-xl text-red-400 hover:text-red-300 hover:bg-red-500/10 transition-all cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span class="hidden lg:block text-sm font-bold">Déconnexion</span>
            </button>
        </form>
    </div>
</aside>
